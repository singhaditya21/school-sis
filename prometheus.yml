global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'school-sis-web'
    static_configs:
      - targets: ['host.docker.internal:3000'] # Assuming running locally on port 3000

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "alert.rules"
