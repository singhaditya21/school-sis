services:
  - type: web
    name: school-sis
    env: node
    region: singapore # Closest to your ap-southeast-2 Supabase database for lightning-fast speeds!
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @school-sis/web run db:push && pnpm --filter @school-sis/web run build
    startCommand: pnpm --filter @school-sis/web run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: PII_ENCRYPTION_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: AGENT_WEBHOOK_SECRET
        sync: false
      - key: AGENT_SERVICE_URL
        sync: false
      - key: AGENT_API_TOKEN
        sync: false
      - key: IOT_INGEST_SECRET
        sync: false
      - key: IOT_SYSTEM_USER_ID
        sync: false
      - key: METRICS_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
  - type: web
    name: school-sis-agents
    env: docker
    rootDir: services/agents
    region: singapore
    plan: free
    envVars:
      - key: AGENT_ENVIRONMENT
        value: production
      - key: AGENT_API_TOKEN
        sync: false
      - key: AGENT_DATABASE_URL
        sync: false
      - key: AGENT_REDIS_URL
        sync: false
      - key: AGENT_LLM_API_KEY
        sync: false
      - key: AGENT_NVIDIA_API_KEY
        sync: false
      - key: AGENT_ALLOWED_ORIGINS
        sync: false
