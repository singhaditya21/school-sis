global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'agent-webhook'

receivers:
  - name: 'agent-webhook'
    webhook_configs:
      - url: 'http://host.docker.internal:3000/api/agent-webhook'
        http_config:
          bearer_token: 'dev-secret'
