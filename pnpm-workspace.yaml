packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  '@firebase/util': true
  better-sqlite3: true
  core-js: true
  esbuild: true
  msw: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

overrides:
  minimatch: ">=9.0.7"
  flatted: ">=3.4.2"
  dompurify: ">=3.3.2"
  lodash: ">=4.17.23"
  jspdf: ">=4.2.1"
  jsonwebtoken: ">=9.0.2"
  picomatch: ">=4.0.4"
  next: ">=16.2.5"
