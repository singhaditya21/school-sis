name: E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./apps/web

      - name: Run linter
        run: npm run lint
        working-directory: ./apps/web

      - name: Build Next.js app
        run: npm run build
        working-directory: ./apps/web

      # Upload the Next.js build output to share with the test runners
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ./apps/web/.next
          key: ${{ runner.os }}-nextjs-${{ github.sha }}

  test:
    name: Playwright Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    needs: build
    runs-on: ubuntu-latest
    
    # Run Postgres as a service container for the tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: school_sis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./apps/web

      - name: Restore Next.js build
        uses: actions/cache@v4
        with:
          path: ./apps/web/.next
          key: ${{ runner.os }}-nextjs-${{ github.sha }}

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        working-directory: ./apps/web

      - name: Run Playwright Tests
        working-directory: ./apps/web
        env:
          # Point the tests to the local Postgres service container
          DATABASE_URL: postgresql://postgres:password@localhost:5432/school_sis
        run: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shardIndex }}
          path: apps/web/playwright-report/
          retention-days: 14
