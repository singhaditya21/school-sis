name: E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      suite:
        description: "E2E suite to run"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - full
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.9"

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm --filter @school-sis/web build
        env:
          # Dummy database URL so static rendering doesn't crash during build
          DATABASE_URL: postgresql://postgres:password@localhost:5432/school_sis?sslmode=require

      # Upload the Next.js build output to share with the test runners
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ./apps/web/.next
          key: ${{ runner.os }}-nextjs-${{ github.sha }}

  migrate-check:
    name: Migration Chain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'
    # Applies the ordered Drizzle migrations to a FRESH database so a broken or
    # mis-ordered migration fails here in CI, not on the Vercel production build.
    # INFORMATIONAL (continue-on-error) until issue #45 is fixed: the chain
    # currently can't build a fresh DB (metadata_* tables are never CREATEd by any
    # migration). Remove continue-on-error once #45 lands to make this enforcing.
    continue-on-error: true
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: school_sis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enable pgvector extension
        run: PGPASSWORD=password psql -h localhost -U postgres -d school_sis -c 'CREATE EXTENSION IF NOT EXISTS vector;'

      - name: Apply the full migration chain to a fresh database
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/school_sis
          DIRECT_URL: postgresql://postgres:password@localhost:5432/school_sis
        run: pnpm --filter @school-sis/web exec drizzle-kit migrate

  smoke:
    name: Playwright Smoke
    needs: build
    # Runs on push, PR, the nightly schedule, and workflow_dispatch(smoke).
    # The nightly cron uses the smoke suite (which is stable) so scheduled runs
    # do not fail-email; the exhaustive suite is opt-in via the `full` job below.
    if: github.event_name != 'workflow_dispatch' || inputs.suite == 'smoke'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: school_sis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build
        uses: actions/cache@v4
        with:
          path: ./apps/web/.next
          key: ${{ runner.os }}-nextjs-${{ github.sha }}

      - name: Install Playwright Browsers
        run: pnpm --filter @school-sis/web exec playwright install --with-deps chromium

      - name: Run Playwright Smoke Tests
        timeout-minutes: 15
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/school_sis
          SEED_USER_PASSWORD: e2e-seed-password-32-characters
          TEST_DATABASE_SUFFIX: smoke
          PLAYWRIGHT_GLOBAL_TIMEOUT_MS: "900000"
        run: pnpm --filter @school-sis/web run test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: apps/web/playwright-report/
          retention-days: 14

  full:
    name: Playwright Tests (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    needs: build
    # Manual-only until the suite is stabilised (it currently exceeds the shard
    # time budget on CI's single worker). Run via the "Run workflow" button with
    # suite=full. Tracked as a stabilisation issue.
    if: github.event_name == 'workflow_dispatch' && inputs.suite == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    # Run Postgres as a service container for the tests
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: school_sis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        # 8 shards keeps per-shard runtime under the 50-minute step budget on
        # CI's single Playwright worker (4 shards previously timed out).
        shardIndex: [1, 2, 3, 4, 5, 6, 7, 8]
        shardTotal: [8]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Next.js build
        uses: actions/cache@v4
        with:
          path: ./apps/web/.next
          key: ${{ runner.os }}-nextjs-${{ github.sha }}

      - name: Install Playwright Browsers
        run: pnpm --filter @school-sis/web exec playwright install --with-deps chromium

      - name: Run Playwright Tests
        timeout-minutes: 50
        env:
          # Point the tests to the local Postgres service container
          DATABASE_URL: postgresql://postgres:password@localhost:5432/school_sis
          SEED_USER_PASSWORD: e2e-seed-password-32-characters
          TEST_DATABASE_SUFFIX: shard_${{ matrix.shardIndex }}
          PLAYWRIGHT_GLOBAL_TIMEOUT_MS: "3000000"
        run: pnpm --filter @school-sis/web run test:e2e --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shardIndex }}
          path: apps/web/playwright-report/
          retention-days: 14
