name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type Check & Lint
        run: |
          pnpm --filter web run lint
          pnpm --filter web exec tsc --noEmit

      - name: Run Unit Tests
        run: pnpm --filter web test

  e2e-and-migrate:
    # Only run the heavy Playwright tests and database migrations on pushes to the main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test-and-lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Apply Neon DB Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Applying migrations to Neon..."
          pnpm --filter web run db:migrate
        
      - name: Install Playwright Browsers
        run: pnpm --filter web exec playwright install --with-deps

      - name: Run E2E Tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY }}
        run: pnpm --filter web exec playwright test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
