name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Infrastructure Contract
        run: pnpm infra:check
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/school_sis?sslmode=require
          DIRECT_URL: postgresql://postgres:password@localhost:5432/school_sis?sslmode=require

      - name: Validate Drizzle Migrations
        run: pnpm --filter @school-sis/web exec drizzle-kit check

      - name: Run TypeScript
        run: pnpm --filter @school-sis/web exec tsc --noEmit --pretty false --incremental false

      - name: Run Build
        run: pnpm run build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Analyze Bundle Budget
        run: pnpm perf:bundle

      - name: Run Linting
        run: pnpm --filter @school-sis/web exec eslint src --quiet

      - name: Validate Testing Architecture
        run: pnpm test:architecture

      - name: Run Unit Tests
        run: pnpm test:unit

      - name: Validate Load Test Harness
        run: pnpm --filter @school-sis/web run perf:load -- --dry-run
