name: CI — Security & Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Dependency Security Audit ─────────────────────────
  security-audit:
    name: Dependency Audit (CVE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        # Fail on high or critical vulnerabilities
        run: pnpm audit --audit-level=high
        working-directory: apps/web

  # ─── 2. TypeScript Type Check ─────────────────────────────
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit
        working-directory: apps/web

  # ─── 3. Lint ──────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (fails on errors, reports warnings)
        run: pnpm lint
        working-directory: apps/web

  # ─── 4. Unit Tests ────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test --passWithNoTests
        working-directory: apps/web
        env:
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY || 'test-encryption-key-32-chars-long!!' }}

  # ─── 5. Build Validation ──────────────────────────────────
  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm build
        working-directory: apps/web
        env:
          # Provide dummy vars so build doesn't fail on missing env checks
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://dummy:dummy@localhost:5432/dummy' }}
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY || 'test-encryption-key-32-chars-long!!' }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'test-session-secret-min-32-chars!!' }}
          NEXT_PUBLIC_APP_URL: 'https://app.scholarmind.io'

  # ─── 6. Python Agent Service Lint ─────────────────────────
  python-lint:
    name: Python Agents Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint agents service
        run: ruff check src/
        working-directory: services/agents
