name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.9"

jobs:
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Dependency Audit
        run: |
          pnpm audit --json > pnpm-audit-high.json || true
          pnpm audit:check -- pnpm-audit-high.json

      - name: Run Secret Pattern Scan
        run: pnpm audit:secrets

      - name: Validate Drizzle Migrations
        run: pnpm --filter @school-sis/web exec drizzle-kit check

      - name: Run TypeScript
        run: pnpm --filter @school-sis/web exec tsc --noEmit --pretty false --incremental false

      - name: Run Build
        run: pnpm run build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Analyze Bundle Budget
        run: pnpm perf:bundle

      - name: Run Linting
        run: pnpm --filter @school-sis/web exec eslint src --quiet

      - name: Validate Testing Architecture
        run: pnpm test:architecture

      - name: Run Unit Tests
        run: pnpm test:unit

      - name: Validate Load Test Harness
        run: pnpm --filter @school-sis/web run perf:load -- --dry-run

      - name: Upload CI Evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-evidence-${{ github.run_id }}
          path: |
            pnpm-audit-high.json
          if-no-files-found: ignore
          retention-days: 14
